name: beatflirt
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  flutter_launcher_icons: ^0.14.4
  font_awesome_flutter: ^11.0.0
  material_symbol_icons: ^0.0.1
  shared_preferences: ^2.5.5
  http: ^1.6.0
  image_picker: ^1.2.2
  video_player: ^2.10.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_riverpod: ^3.3.2
  intl: ^0.20.2
  dio: ^5.9.2
  socket_io_client: ^3.1.4
  razorpay_flutter: ^1.4.5
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  firebase_storage: ^13.4.0
  google_maps_flutter: ^2.17.0
  uuid: ^4.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  get_thumbnail_video: ^0.7.3
  google_fonts: ^8.1.0
  flutter_html: ^3.0.0
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  lib: ^0.3.0
  flutter_svg: ^2.3.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  photo_view: ^0.15.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/logo.png

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0


dependency_overrides:

  package_info_plus: ^8.0.0  # latest stable version

flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/
    - assets/logo/
    - assets/svg/
    - assets/
 

